name: 功能建议
description: 建议新功能或对现有功能的改进
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: 功能描述
      description: 请描述你希望添加或改进的功能
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: 使用场景
      description: 在什么场景下需要这个功能？解决什么问题？
      placeholder: |
        例如:
        作为 IDC 运营人员，我需要批量导入 IP 地址段，目前只能逐条添加，效率很低。
    validations:
      required: true

  - type: textarea
    id: expected-effect
    attributes:
      label: 期望效果
      description: 你期望这个功能实现后的效果是什么样的
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 是否有其他方式可以临时达成目标？你目前是怎么解决的？

  - type: textarea
    id: extra
    attributes:
      label: 补充信息
      description: 其他相关的参考资料、截图或说明
